<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ujian Siswa - CBT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; -webkit-user-select: none; user-select: none; }
        .hide { display: none !important; }
        .modal-masuk { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8" oncontextmenu="return false;">

    <div id="studentModal" class="hide fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 modal-masuk text-center">
            <div id="modalIcon" class="mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-2xl"></div>
            <h3 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">Pemberitahuan</h3>
            <p id="modalMessage" class="text-slate-600 mb-6"></p>
            <div id="modalButtons" class="flex justify-center gap-3"></div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto space-y-6 pb-10">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b pb-6 mb-6">
            <div class="flex items-center gap-4">
                <img src="https://www.image2url.com/r2/default/images/1780556788630-285bb5c4-243f-435b-9319-dfc7d320683e.jpeg" alt="Logo" class="w-16 h-16 object-contain">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">Ujian Siswa CBT</h1>
                    <p class="text-slate-500">SMKN 1 Banjarmasin</p>
                </div>
            </div>
            <div id="syncStatus" class="hide bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full font-bold text-sm">Terkoneksi</div>
        </header>

        <div id="nisCard" class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-4 text-blue-700">Masuk dengan NIS</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Nomor Induk Siswa</label>
                    <input type="text" id="nisInput" placeholder="Masukkan NIS Anda..." class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none text-lg font-semibold">
                </div>
                <button onclick="cekNIS()" id="btnCariSiswa" class="bg-blue-600 text-white rounded-xl px-6 py-3 font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-600/30">Cek Data Siswa</button>
            </div>
        </div>

        <div id="studentInfoCard" class="hide bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-4 text-emerald-700">Data Anda Ditemukan</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-slate-700 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div><span class="font-semibold text-slate-500">NIS:</span> <span id="studentNis" class="font-bold"></span></div>
                <div><span class="font-semibold text-slate-500">Nama:</span> <span id="studentName" class="font-bold"></span></div>
                <div><span class="font-semibold text-slate-500">Jurusan:</span> <span id="studentJurusan" class="font-bold"></span></div>
                <div><span class="font-semibold text-slate-500">Kelas:</span> <span id="studentKelas" class="font-bold"></span></div>
            </div>
            <div class="mt-6 flex gap-3">
                <button onclick="batalLogin()" class="bg-slate-200 text-slate-700 rounded-xl px-6 py-3 font-bold hover:bg-slate-300 transition">Bukan Saya</button>
                <button onclick="bukaRuangTunggu()" class="bg-emerald-600 text-white rounded-xl px-6 py-3 font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-600/30">Ya, Benar (Lanjut)</button>
            </div>
        </div>

        <div id="scheduleCard" class="hide bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Detail Jadwal Ujian</h2>
                    <p id="scheduleStatusText" class="text-slate-500 mt-1"></p>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-slate-700 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div><span class="font-semibold text-slate-500">Mapel:</span> <span id="scheduleMapel" class="font-bold text-blue-700"></span></div>
                <div><span class="font-semibold text-slate-500">Guru:</span> <span id="scheduleGuru" class="font-bold"></span></div>
                <div><span class="font-semibold text-slate-500">Tanggal:</span> <span id="scheduleTanggal" class="font-bold"></span></div>
                <div><span class="font-semibold text-slate-500">Waktu:</span> <span id="scheduleWaktu" class="font-bold"></span></div>
            </div>
            <div class="mt-6">
                <button onclick="masukKeUjian()" id="btnStartExam" class="w-full md:w-auto bg-slate-300 text-slate-500 rounded-xl px-8 py-3.5 font-bold transition" disabled>Memuat Waktu...</button>
            </div>
        </div>

        <div id="examCard" class="hide bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div>
                    <h2 class="text-xl font-bold text-slate-800" id="examMapelTitle">Mapel</h2>
                    <p class="text-sm text-slate-500" id="examStudentInfo">Nama - Kelas</p>
                </div>
                <div class="text-right">
                    <span class="font-bold text-slate-700 bg-slate-100 px-3 py-1 rounded-md">Soal No. <span id="nomorSoalDisplay" class="text-blue-700">1</span></span>
                </div>
            </div>

            <p id="teksSoal" class="text-lg text-slate-800 mb-6 font-medium leading-relaxed"></p>
            <div id="opsiJawaban" class="space-y-3 mb-8"></div>

            <div class="flex justify-between items-center gap-2 border-t pt-6">
                <button onclick="gantiSoal(-1)" class="px-5 py-2.5 bg-slate-200 text-slate-700 rounded-xl font-bold hover:bg-slate-300 transition">Sebelumnya</button>
                <button id="btnNextSelesai" onclick="gantiSoal(1)" class="px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition">Selanjutnya</button>
            </div>
        </div>

    </div>

    <script>
        const sb = supabase.createClient('https://lntfulglflqoatahvwjd.supabase.co', 'sb_publishable_fCSKRizp5vzbFUxBsTcb5g_jSSSOO0h');

        let dataSiswaAktif = null;
        let jadwalAktif = null;
        let bankSoal = [];
        let indexSoal = 0;
        let jawabanSiswa = {}; 
        let cheatCount = 0;
        let timerCekWaktu;

        // --- SISTEM MODAL ---
        function showStudentModal(title, msg, type='info', isConfirm=false, onConfirm=null) {
            document.getElementById('modalTitle').innerHTML = title;
            document.getElementById('modalMessage').innerHTML = msg;
            const icon = document.getElementById('modalIcon');
            if(type === 'error') {
                icon.className = 'mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-red-100 text-red-500'; icon.innerHTML = '✖';
            } else if(type === 'success') {
                icon.className = 'mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-emerald-100 text-emerald-500'; icon.innerHTML = '✔';
            } else {
                icon.className = 'mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-blue-100 text-blue-500'; icon.innerHTML = 'ℹ';
            }

            let btnHTML = '';
            if (isConfirm) {
                btnHTML = `
                    <button onclick="tutupModal()" class="px-4 py-2 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 w-full">Batal</button>
                    <button id="btnConfirmModal" class="px-4 py-2 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 w-full">Ya, Selesai</button>
                `;
            } else {
                btnHTML = `<button onclick="tutupModal()" class="px-6 py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 w-full">Tutup</button>`;
            }
            
            document.getElementById('modalButtons').innerHTML = btnHTML;
            document.getElementById('studentModal').classList.remove('hide');

            if (isConfirm && onConfirm) {
                document.getElementById('btnConfirmModal').onclick = () => { tutupModal(); onConfirm(); };
            }
        }
        function tutupModal() { document.getElementById('studentModal').classList.add('hide'); }

        // --- ALUR 1: CEK NIS ---
        async function cekNIS() {
            const nis = document.getElementById('nisInput').value.trim();
            const btn = document.getElementById('btnCariSiswa');
            
            if(!nis) return showStudentModal("Peringatan", "NIS tidak boleh kosong!", "error");
            
            btn.textContent = "Mencari..."; btn.disabled = true;

            try {
                const { data: siswa, error: errSiswa } = await sb.from('data_siswa').select('*').eq('nis', nis).single();
                if (errSiswa || !siswa) throw new Error("NIS tidak terdaftar di sistem.");
                
                dataSiswaAktif = siswa;
                
                // Tampilkan Data ke Card 2
                document.getElementById('studentNis').textContent = siswa.nis;
                document.getElementById('studentName').textContent = siswa.nama;
                document.getElementById('studentJurusan').textContent = siswa.jurusan;
                document.getElementById('studentKelas').textContent = siswa.kelas;
                
                document.getElementById('studentInfoCard').classList.remove('hide');
                document.getElementById('nisInput').disabled = true;
                btn.classList.add('hide');

            } catch (error) {
                showStudentModal("Gagal", error.message, "error");
            } finally {
                btn.textContent = "Cek Data Siswa"; btn.disabled = false;
            }
        }

        function batalLogin() {
            dataSiswaAktif = null;
            document.getElementById('nisInput').value = '';
            document.getElementById('nisInput').disabled = false;
            document.getElementById('btnCariSiswa').classList.remove('hide');
            document.getElementById('studentInfoCard').classList.add('hide');
        }

        // --- ALUR 2: BUKA JADWAL (RUANG TUNGGU) ---
        async function bukaRuangTunggu() {
            document.getElementById('studentInfoCard').classList.add('hide');
            
            try {
                const hariIni = new Date().toISOString().split('T')[0];

                const { data: jadwal, error: errJadwal } = await sb.from('jadwal_ujian')
                    .select('*, bank_soal(*)')
                    .eq('tanggal', hariIni)
                    .contains('jurusan', [dataSiswaAktif.jurusan])
                    .contains('kelas', [dataSiswaAktif.kelas]);

                if (errJadwal || jadwal.length === 0) {
                    throw new Error(`Tidak ada jadwal ujian untuk Jurusan <b>${dataSiswaAktif.jurusan}</b> Kelas <b>${dataSiswaAktif.kelas}</b> hari ini.`);
                }
                
                jadwalAktif = jadwal[0];
                bankSoal = jadwalAktif.bank_soal.soal; 

                // Isi Data Card 3
                document.getElementById('scheduleMapel').textContent = jadwalAktif.nama_mapel;
                document.getElementById('scheduleGuru').textContent = jadwalAktif.nama_pengajar || '-';
                document.getElementById('scheduleTanggal').textContent = jadwalAktif.tanggal;
                document.getElementById('scheduleWaktu').textContent = `${jadwalAktif.jam_mulai.substring(0,5)} s/d ${jadwalAktif.jam_selesai.substring(0,5)} WITA`;

                document.getElementById('scheduleCard').classList.remove('hide');

                timerCekWaktu = setInterval(updateStatusTombolMulai, 1000);
                updateStatusTombolMulai(); 

            } catch (error) {
                showStudentModal("Jadwal Kosong", error.message, "info");
                batalLogin();
            }
        }

        // --- ALUR 3: KUNCI WAKTU ---
        function updateStatusTombolMulai() {
            const now = new Date();
            const waktuSekarang = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0') + ':' + now.getSeconds().toString().padStart(2, '0');

            const btn = document.getElementById('btnStartExam');
            const statusText = document.getElementById('scheduleStatusText');

            if (waktuSekarang < jadwalAktif.jam_mulai) {
                btn.disabled = true;
                btn.className = "w-full md:w-auto bg-slate-200 text-slate-500 rounded-xl px-8 py-3.5 font-bold cursor-not-allowed";
                btn.textContent = "UJIAN BELUM DIMULAI";
                statusText.innerHTML = `<span class="text-orange-500 font-bold">Menunggu Jam Ujian...</span>`;
            } else if (waktuSekarang > jadwalAktif.jam_selesai) {
                btn.disabled = true;
                btn.className = "w-full md:w-auto bg-red-100 text-red-500 rounded-xl px-8 py-3.5 font-bold cursor-not-allowed";
                btn.textContent = "WAKTU BERAKHIR";
                statusText.innerHTML = `<span class="text-red-500 font-bold">Ujian Ditutup</span>`;
            } else {
                btn.disabled = false;
                btn.className = "w-full md:w-auto bg-emerald-600 text-white rounded-xl px-8 py-3.5 font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-600/30 transition";
                btn.textContent = "MULAI UJIAN SEKARANG";
                statusText.innerHTML = `<span class="text-emerald-600 font-bold">Waktu Ujian Berlangsung</span>`;
            }
        }

        // --- ALUR 4: MASUK UJIAN ---
        async function masukKeUjian() {
            clearInterval(timerCekWaktu); 
            const btn = document.getElementById('btnStartExam');
            btn.textContent = "MEMPERSIAPKAN...";
            
            try {
                const { error: errHasil } = await sb.from('hasil_ujian').upsert({
                    id_jadwal: jadwalAktif.id,
                    nis_siswa: dataSiswaAktif.nis,
                    nama_siswa: dataSiswaAktif.nama,
                    kelas_siswa: dataSiswaAktif.kelas,
                    nama_mapel: jadwalAktif.nama_mapel
                }, { onConflict: 'id_jadwal, nis_siswa', ignoreDuplicates: true });

                if (errHasil) throw new Error("Gagal inisialisasi database.");

                // Sembunyikan semua card awal, Tampilkan Card Ujian
                document.getElementById('nisCard').classList.add('hide');
                document.getElementById('scheduleCard').classList.
