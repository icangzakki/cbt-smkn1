<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Guru & Admin - CBT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .hide { display: none !important; }
        .modal-masuk { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .cb-modern { @apply flex items-center gap-2 cursor-pointer bg-white px-3 py-2 border border-slate-200 rounded-lg hover:bg-emerald-50 hover:border-emerald-300 transition shadow-sm; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="adminModal" class="hide fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-6 modal-masuk text-center">
            <div id="modalIcon" class="mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-2xl"></div>
            <h3 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">Pemberitahuan</h3>
            <p id="modalMessage" class="text-slate-600 mb-6"></p>
            <button onclick="document.getElementById('adminModal').classList.add('hide')" class="px-6 py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 w-full shadow-lg shadow-slate-900/20">Tutup</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto space-y-8 pb-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 mb-6 gap-4">
    <div class="flex items-center gap-4">
        <img src="https://www.image2url.com/r2/default/images/1780556788630-285bb5c4-243f-435b-9319-dfc7d320683e.jpeg" 
             alt="Logo" class="w-16 h-16 object-contain">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">Manajemen Ujian CBT</h1>
            <p class="text-slate-500">SMKN 1 Banjarmasin</p>
        </div>
    </div>
    <a href="siswa.html" class="inline-flex items-center justify-center rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 shadow-sm">Halaman Siswa</a>
</header>

        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-5 border-b pb-2 text-blue-700">1. Upload Bank Soal (Guru)</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Mata Pelajaran</label>
                    <input type="text" id="mapel" placeholder="Contoh: Admin Sistem Jaringan" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Durasi Ujian (Menit)</label>
                    <input type="number" id="durasi" value="90" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-blue-500">
                </div>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-semibold mb-2 text-slate-700">Pilih File Excel (Kolom: soal | A | B | C | D | jawaban)</label>
                <input type="file" id="fileSoal" accept=".xlsx, .xls, .csv" class="w-full p-2.5 border border-slate-200 rounded-xl bg-slate-50 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700">
            </div>
            
            <button onclick="prosesExcel()" id="btnUpload" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-600/30">Simpan ke Database Soal</button>
            <p id="statusUpload" class="mt-3 text-sm font-semibold text-emerald-600"></p>
        </div>

        <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-5 border-b pb-2 text-emerald-700">2. Rilis Jadwal Ujian (Admin)</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Pilih Master Soal</label>
                    <select id="selectBankSoal" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-500"></select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Nama Guru Pengajar</label>
                    <input type="text" id="namaPengajar" placeholder="Contoh: Bpk. Ihsan Muzakki" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-500">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-5">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Tanggal Pelaksanaan</label>
                    <input type="date" id="tanggalJadwal" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Jam Soal Aktif</label>
                    <input type="time" id="jamMulai" value="07:00" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Jam Soal Nonaktif</label>
                    <input type="time" id="jamSelesai" value="09:00" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-emerald-500">
                </div>
            </div>

            <div class="mb-6 bg-slate-50 p-5 rounded-2xl border border-slate-200 shadow-inner">
                <label class="block font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">Target Peserta Ujian</label>
                
                <div class="mb-4">
                    <span class="block text-xs font-bold text-slate-500 uppercase mb-2">1. Pilih Jurusan:</span>
                    <div class="flex flex-wrap gap-2">
                        <label class="cb-modern"><input type="checkbox" name="jurusanTarget" value="TJKT" class="w-4 h-4 accent-emerald-600"> <span class="font-bold text-slate-700">TJKT</span></label>
                        <label class="cb-modern"><input type="checkbox" name="jurusanTarget" value="DKV" class="w-4 h-4 accent-emerald-600"> <span class="font-bold text-slate-700">DKV</span></label>
                        <label class="cb-modern"><input type="checkbox" name="jurusanTarget" value="MPLB" class="w-4 h-4 accent-emerald-600"> <span class="font-bold text-slate-700">MPLB</span></label>
                        <label class="cb-modern"><input type="checkbox" name="jurusanTarget" value="AKL" class="w-4 h-4 accent-emerald-600"> <span class="font-bold text-slate-700">AKL</span></label>
                        <label class="cb-modern"><input type="checkbox" name="jurusanTarget" value="PM" class="w-4 h-4 accent-emerald-600"> <span class="font-bold text-slate-700">PM</span></label>
                    </div>
                </div>

                <div class="mb-4">
                    <span class="block text-xs font-bold text-slate-500 uppercase mb-2">2. Pilih Tingkat Kelas:</span>
                    <div class="flex flex-wrap gap-2">
                        <label class="cb-modern"><input type="checkbox" name="tingkatTarget" value="X" class="w-4 h-4 accent-blue-600"> <span class="font-bold text-slate-700">Kelas X</span></label>
                        <label class="cb-modern"><input type="checkbox" name="tingkatTarget" value="XI" class="w-4 h-4 accent-blue-600"> <span class="font-bold text-slate-700">Kelas XI</span></label>
                        <label class="cb-modern"><input type="checkbox" name="tingkatTarget" value="XII" class="w-4 h-4 accent-blue-600"> <span class="font-bold text-slate-700">Kelas XII</span></label>
                    </div>
                </div>

                <div>
                    <span class="block text-xs font-bold text-slate-500 uppercase mb-2">3. Pilih Rombel / Grup:</span>
                    <div class="flex flex-wrap gap-2">
                        <label class="cb-modern"><input type="checkbox" name="rombelTarget" value="A" class="w-4 h-4 accent-orange-600"> <span class="font-bold text-slate-700">A</span></label>
                        <label class="cb-modern"><input type="checkbox" name="rombelTarget" value="B" class="w-4 h-4 accent-orange-600"> <span class="font-bold text-slate-700">B</span></label>
                        <label class="cb-modern"><input type="checkbox" name="rombelTarget" value="C" class="w-4 h-4 accent-orange-600"> <span class="font-bold text-slate-700">C</span></label>
                        <label class="cb-modern"><input type="checkbox" name="rombelTarget" value="D" class="w-4 h-4 accent-orange-600"> <span class="font-bold text-slate-700">D</span></label>
                    </div>
                </div>
            </div>

            <button onclick="rilisJadwal()" id="btnRilis" class="bg-emerald-600 text-white w-full md:w-auto px-8 py-3 rounded-xl font-bold hover:bg-emerald-700 shadow-lg shadow-emerald-600/30 transition">Rilis Jadwal Sekarang</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://lntfulglflqoatahvwjd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_fCSKRizp5vzbFUxBsTcb5g_jSSSOO0h';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const MAX_BANK_SOAL_FETCH = 200;
        const REQUIRED_EXCEL_FIELDS = ['soal', 'a', 'b', 'c', 'd', 'jawaban'];

        function showAdminModal(title, msg, type = 'info') {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalMessage').innerHTML = msg;

            const icon = document.getElementById('modalIcon');
            if (type === 'error') {
                icon.className = 'mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-red-100 text-red-500';
                icon.innerHTML = '✖';
            } else if (type === 'success') {
                icon.className = 'mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-emerald-100 text-emerald-500';
                icon.innerHTML = '✔';
            } else {
                icon.className = 'mx-auto w-16 h-16 mb-4 rounded-full flex items-center justify-center text-3xl bg-blue-100 text-blue-500';
                icon.innerHTML = 'ℹ';
            }
            document.getElementById('adminModal').classList.remove('hide');
        }

        function normalizeKey(key) {
            return String(key || '').trim().toLowerCase();
        }

        function buildRow(row, index) {
            const normalized = {};
            Object.entries(row).forEach(([key, value]) => {
                normalized[normalizeKey(key)] = value;
            });
            return {
                id: index + 1,
                text: String(normalized.soal || '').trim(),
                opsi: [normalized.a, normalized.b, normalized.c, normalized.d].map(opt => String(opt || '').trim()),
                jawaban: String(normalized.jawaban || '').trim()
            };
        }

        function hasRequiredFields(row) {
            return REQUIRED_EXCEL_FIELDS.every(field => Object.hasOwn(row, field) && String(row[field]).trim() !== '');
        }

        let parsedData = [];
        document.getElementById('fileSoal').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) {
                parsedData = [];
                document.getElementById('statusUpload').textContent = '';
                return;
            }

            const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const workbook = XLSX.read(new Uint8Array(evt.target.result), { type: 'array' });
                    const rawJson = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });

                    if (!rawJson.length) {
                        parsedData = [];
                        return showAdminModal('Gagal', 'File Excel kosong atau tidak memiliki data.', 'error');
                    }

                    const normalizedHeader = Object.keys(rawJson[0]).map(normalizeKey);
                    const missingFields = REQUIRED_EXCEL_FIELDS.filter(field => !normalizedHeader.includes(field));
                    if (missingFields.length) {
                        parsedData = [];
                        return showAdminModal('Format Tidak Valid', `Header Excel harus berisi: ${REQUIRED_EXCEL_FIELDS.join(', ')}. Kolom yang hilang: ${missingFields.join(', ')}.`, 'error');
                    }

                    parsedData = rawJson.map(buildRow).filter(hasRequiredFields);
                    if (!parsedData.length) {
                        return showAdminModal('Gagal', 'Semua baris harus memiliki soal dan jawaban yang lengkap.', 'error');
                    }

                    document.getElementById('statusUpload').textContent = `${parsedData.length} soal terbaca.`;
                } catch (err) {
                    parsedData = [];
                    showAdminModal('Error File', 'Tidak dapat membaca file Excel. Pastikan format .xlsx atau .csv valid.', 'error');
                    console.error(err);
                }
            };
            reader.readAsArrayBuffer(file);
        });

        async function prosesExcel() {
            if (parsedData.length === 0) return showAdminModal('Gagal', 'Pilih file Excel yang valid dahulu!', 'error');

            const btn = document.getElementById('btnUpload');
            const mapel = document.getElementById('mapel').value.trim();
            const durasi = Number(document.getElementById('durasi').value);

            if (!mapel) return showAdminModal('Gagal', 'Nama Mapel belum diisi!', 'error');
            if (!Number.isFinite(durasi) || durasi <= 0) return showAdminModal('Gagal', 'Durasi ujian harus berupa angka positif.', 'error');

            btn.disabled = true;
            btn.textContent = 'Menyimpan...';

            try {
                const { error } = await sb.from('bank_soal').insert([{ nama_mapel: mapel, durasi_menit: durasi, soal: parsedData }]);
                if (error) throw error;

                showAdminModal('Sukses', `Berhasil menyimpan <b>${parsedData.length}</b> soal.`, 'success');
                document.getElementById('statusUpload').textContent = '';
                document.getElementById('fileSoal').value = '';
                parsedData = [];
                await muatDropdownBankSoal();
            } catch (error) {
                showAdminModal('Error Database', error.message || 'Terjadi kesalahan saat menyimpan soal.', 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Simpan ke Database Soal';
            }
        }

        async function muatDropdownBankSoal() {
            const select = document.getElementById('selectBankSoal');
            select.innerHTML = '<option value="">Memuat data...</option>';

            try {
                const { data, error } = await sb.from('bank_soal')
                    .select('id, nama_mapel, dibuat_pada')
                    .order('dibuat_pada', { ascending: false })
                    .limit(MAX_BANK_SOAL_FETCH);

                if (error) throw error;
                if (!data || data.length === 0) {
                    select.innerHTML = '<option value="">-- Belum ada soal --</option>';
                    return;
                }

                select.innerHTML = data.map(b => {
                    const displayId = typeof b.id === 'string' ? b.id.substring(0, 5) : String(b.id).slice(0, 5);
                    return `<option value="${b.id}">${b.nama_mapel} (ID: ${displayId})</option>`;
                }).join('');
            } catch (error) {
                select.innerHTML = '<option value="">-- Gagal memuat soal --</option>';
                showAdminModal('Gagal Memuat', error.message || 'Tidak dapat mengambil daftar bank soal.', 'error');
                console.error(error);
            }
        }

        async function rilisJadwal() {
            const idSoal = document.getElementById('selectBankSoal').value;
            const tgl = document.getElementById('tanggalJadwal').value;
            const guru = document.getElementById('namaPengajar').value.trim() || '-';
            let jamMulai = document.getElementById('jamMulai').value;
            let jamAkhir = document.getElementById('jamSelesai').value;
            const selectEl = document.getElementById('selectBankSoal');
            const namaMapel = selectEl.options[selectEl.selectedIndex]?.text || '';

            const jurusanDipilih = Array.from(document.querySelectorAll('input[name="jurusanTarget"]:checked')).map(cb => cb.value);
            const tingkatDipilih = Array.from(document.querySelectorAll('input[name="tingkatTarget"]:checked')).map(cb => cb.value);
            const rombelDipilih = Array.from(document.querySelectorAll('input[name="rombelTarget"]:checked')).map(cb => cb.value);

            if (!idSoal || !tgl || !jamMulai || !jamAkhir) return showAdminModal('Data Tidak Lengkap', 'Pastikan Bank Soal, Tanggal, dan Jam sudah diisi!', 'error');
            if (!jurusanDipilih.length || !tingkatDipilih.length || !rombelDipilih.length) return showAdminModal('Target Kosong', 'Pilih minimal 1 Jurusan, 1 Tingkat, dan 1 Rombel!', 'error');

            const kelasKombinasi = [];
            tingkatDipilih.forEach(tingkat => rombelDipilih.forEach(rombel => kelasKombinasi.push(`${tingkat} ${rombel}`)));

            jamMulai = jamMulai.length === 5 ? `${jamMulai}:00` : jamMulai;
            jamAkhir = jamAkhir.length === 5 ? `${jamAkhir}:00` : jamAkhir;

            const btn = document.getElementById('btnRilis');
            btn.disabled = true;
            btn.textContent = 'Memproses...';

            try {
                const namaMapelText = namaMapel.split(' (')[0].trim();
                const { error } = await sb.from('jadwal_ujian').insert([{
                    bank_soal_id: idSoal,
                    nama_mapel: namaMapelText,
                    nama_pengajar: guru,
                    tanggal: tgl,
                    jam_mulai: jamMulai,
                    jam_selesai: jamAkhir,
                    jurusan: jurusanDipilih,
                    kelas: kelasKombinasi
                }]);

                if (error) throw error;
                showAdminModal('Jadwal Aktif!', `Jadwal berhasil dirilis untuk Jurusan <b>${jurusanDipilih.join(', ')}</b><br>Kelas: <b>${kelasKombinasi.join(', ')}</b><br>Guru: ${guru}`, 'success');
            } catch (error) {
                showAdminModal('Gagal Rilis', error.message || 'Terjadi kesalahan saat merilis jadwal.', 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Rilis Jadwal Sekarang';
            }
        }

        window.onload = muatDropdownBankSoal;
    </script>
</body>
</html>
