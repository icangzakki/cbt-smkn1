<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ujian Siswa - CBT SMKN 1 Banjarmasin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-user-select: none;
            user-select: none;
        }

        .hide { display: none !important; }

        /* =========================================
           LOGIN CARD
        ========================================= */
        .login-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 48px 40px 44px;
            width: 100%;
            max-width: 460px;
            box-shadow:
                0 4px 6px -1px rgba(0,0,0,0.07),
                0 20px 60px -10px rgba(99,132,255,0.12),
                0 1px 2px rgba(0,0,0,0.05);
            text-align: center;
            animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Logo */
        .logo-wrapper {
            width: 108px;
            height: 108px;
            margin: 0 auto 28px;
            animation: float 3s ease-in-out infinite;
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 20px rgba(37,99,235,0.25));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }

        /* Heading */
        .portal-title {
            font-size: 2.4rem;
            font-weight: 900;
            color: #1e40af;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .portal-subtitle {
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 36px;
        }

        /* Form */
        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #374151;
            text-align: left;
            margin-bottom: 10px;
        }

        .nis-input {
            width: 100%;
            padding: 16px 20px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            text-align: center;
            letter-spacing: 0.03em;
            transition: all 0.25s ease;
        }

        .nis-input::placeholder {
            color: #94a3b8;
            font-weight: 500;
        }

        .nis-input:focus {
            background: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
        }

        .btn-cek {
            width: 100%;
            margin-top: 16px;
            padding: 16px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #ffffff;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 60%, #1d4ed8 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px -6px rgba(37,99,235,0.45);
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .btn-cek::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-cek:hover::before { transform: translateX(100%); }

        .btn-cek:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px -6px rgba(37,99,235,0.55);
        }

        .btn-cek:active {
            transform: translateY(0);
        }

        /* =========================================
           NAVIGASI SOAL SIDEBAR
        ========================================= */
        .navigasi-soal-wrapper {
            position: fixed;
            top: 0;
            right: -340px;
            width: 340px;
            height: 100vh;
            background: #ffffff;
            border-left: 2px solid #e2e8f0;
            padding: 24px;
            box-shadow: -10px 0 40px rgba(0,0,0,0.1);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            overflow-y: auto;
        }

        .navigasi-soal-wrapper.open {
            right: 0;
        }

        .navigasi-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .navigasi-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .navigasi-header-sidebar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
        }

        .navigasi-soal-title {
            font-size: 1rem;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .navigasi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
            gap: 10px;
        }

        .btn-nav-soal {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #475569;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            box-shadow: 0 2px 0 #cbd5e1;
        }

        .btn-nav-soal:hover {
            background: #f1f5f9;
            transform: translateY(1px);
            box-shadow: 0 1px 0 #cbd5e1;
        }

        .btn-nav-soal.answered {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: #1d4ed8;
            color: #ffffff;
            box-shadow: 0 2px 0 #1e40af;
        }
        
        .btn-nav-soal.answered:hover {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #1e40af;
        }

        .btn-nav-soal.active {
            border: 2px solid #0f172a;
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 0 0 3px rgba(15,23,42,0.1), 0 3px 0 #0f172a;
            transform: translateY(-2px);
        }

        .btn-nav-soal.answered.active {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-color: #1e3a8a;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2), 0 3px 0 #1e3a8a;
            color: #ffffff;
        }

        /* =========================================
           STUDENT INFO CARD (same wrapper)
        ========================================= */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 20px;
        }

        .info-grid .field-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .info-grid .field-value {
            font-size: 1rem;
            font-weight: 800;
            color: #1e293b;
        }

        .info-grid .full-col { grid-column: 1 / -1; }

        .success-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #dcfce7;
            color: #15803d;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 99px;
            margin-bottom: 18px;
        }

        .action-row {
            display: flex;
            gap: 10px;
        }

        .btn-bukan {
            flex: 1;
            padding: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: #475569;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-bukan:hover {
            background: #e2e8f0;
            border-color: #cbd5e1;
        }

        .btn-lanjut {
            flex: 2;
            padding: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 24px -4px rgba(16,185,129,0.4);
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .btn-lanjut:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -4px rgba(16,185,129,0.5);
        }

        /* =========================================
           SCHEDULE / WAITING ROOM CARD
        ========================================= */
        .section-heading {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1e293b;
            text-align: left;
            margin-bottom: 4px;
        }

        .status-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            text-align: left;
            margin-bottom: 18px;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 20px;
        }

        .schedule-grid .field-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .schedule-grid .field-value {
            font-size: 1rem;
            font-weight: 800;
            color: #1e293b;
        }

        .schedule-grid .full-col { grid-column: 1 / -1; }
        .schedule-grid .mapel-value { color: #2563eb; font-size: 1.15rem; }

        .btn-mulai {
            width: 100%;
            padding: 16px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            color: #ffffff;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 10px 28px -6px rgba(37,99,235,0.45);
            transition: all 0.3s ease;
        }

        .btn-mulai:disabled {
            background: linear-gradient(135deg, #cbd5e1, #94a3b8);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* =========================================
           EXAM CARD
        ========================================= */
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            padding-bottom: 18px;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 24px;
        }

        .exam-mapel {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1e293b;
        }

        .exam-siswa-badge {
            display: inline-block;
            margin-top: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #2563eb;
            background: #eff6ff;
            padding: 4px 12px;
            border-radius: 99px;
        }

        .nomor-soal-box {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 18px;
            text-align: center;
            white-space: nowrap;
        }

        .nomor-soal-label {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
        }

        .nomor-soal-num {
            font-size: 1.8rem;
            font-weight: 900;
            color: #2563eb;
            line-height: 1.1;
        }

        .teks-soal {
            font-size: 1.05rem;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        .opsi-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 16px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #334155;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }

        .opsi-item:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }

        .opsi-item.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }

        .opsi-huruf {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            min-width: 28px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 800;
            color: #475569;
            transition: all 0.2s ease;
        }

        .opsi-item.selected .opsi-huruf {
            background: #3b82f6;
            color: white;
        }

        .exam-footer {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding-top: 18px;
            border-top: 2px solid #f1f5f9;
        }

        .btn-prev {
            padding: 13px 24px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: #475569;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-prev:hover { background: #e2e8f0; }

        .btn-next {
            flex: 1;
            padding: 13px 24px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px -4px rgba(37,99,235,0.4);
            transition: all 0.3s ease;
        }

        .btn-next:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 28px -4px rgba(37,99,235,0.5);
        }

        /* =========================================
           MODALS
        ========================================= */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(15,23,42,0.55);
            backdrop-filter: blur(8px);
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .modal-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 36px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px -10px rgba(0,0,0,0.25);
            animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.75) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: float 2.5s ease-in-out infinite;
        }

        .icon-success { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 12px 30px -6px rgba(16,185,129,0.35); }
        .icon-error   { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 12px 30px -6px rgba(239,68,68,0.35); }
        .icon-info    { background: linear-gradient(135deg, #3b82f6, #1d4ed8); box-shadow: 0 12px 30px -6px rgba(59,130,246,0.35); }
        .icon-warning { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 12px 30px -6px rgba(245,158,11,0.35); }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .modal-msg {
            font-size: 0.92rem;
            font-weight: 500;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .modal-btn-primary {
            width: 100%;
            padding: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 24px -4px rgba(37,99,235,0.4);
            transition: all 0.3s ease;
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -4px rgba(37,99,235,0.5);
        }

        .modal-btn-success-full {
            width: 100%;
            padding: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: #ffffff;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 24px -4px rgba(16,185,129,0.4);
            transition: all 0.3s ease;
        }

        .modal-btn-row {
            display: flex;
            gap: 10px;
        }

        .modal-btn-secondary {
            flex: 1;
            padding: 14px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            color: #475569;
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .modal-btn-secondary:hover { background: #e2e8f0; }

        /* password modal input */
        .pw-input {
            width: 100%;
            padding: 14px 18px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: #1e293b;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            text-align: center;
            margin-bottom: 16px;
            transition: all 0.25s ease;
        }

        .pw-input::placeholder { color: #94a3b8; letter-spacing: 0; }
        .pw-input:focus { background: #fff; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.12); }

        /* admin link */
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 24px;
            font-size: 0.7rem;
            color: transparent;
            cursor: default;
            user-select: none;
        }
        /* responsive mobile */
        @media (max-width: 600px) {
            body { padding: 12px; }
            .login-card { padding: 28px 20px 24px; border-radius: 20px; }
            .info-grid, .schedule-grid { grid-template-columns: 1fr; gap: 12px; }
            .full-col { grid-column: span 1; }
            .exam-header { flex-direction: column; align-items: center; text-align: center; gap: 12px; }
            .exam-header > div:first-child { text-align: center !important; width: 100%; }
            .exam-header > div:last-child { justify-content: center; width: 100%; }
            .exam-footer { gap: 10px; }
            .nomor-soal-box { padding: 8px 14px; }
            .navigasi-grid { grid-template-columns: repeat(auto-fill, minmax(36px, 1fr)); }
            .btn-nav-soal { font-size: 0.85rem; }
            .opsi-item { padding: 12px; }
            .portal-title { font-size: 1.6rem; }
            .logo-wrapper { width: 80px; height: 80px; margin-bottom: 20px; }
            .navigasi-soal-wrapper { width: 280px; right: -280px; padding: 20px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- ===== OVERLAY NAVIGASI ===== -->
    <div id="navigasiOverlay" class="navigasi-overlay" onclick="toggleNavigasi()"></div>

    <!-- ===== SIDEBAR NAVIGASI ===== -->
    <div id="navigasiWrapper" class="navigasi-soal-wrapper">
        <div class="navigasi-header-sidebar">
            <div class="navigasi-soal-title">Navigasi Soal</div>
            <button onclick="toggleNavigasi()" style="background: none; border: none; font-size: 1.5rem; color: #64748b; cursor: pointer; line-height: 1;">&times;</button>
        </div>
        <div id="navigasiSoalGrid" class="navigasi-grid"></div>
    </div>

    <!-- ===== MODAL NOTIFIKASI ===== -->
    <div id="studentModal" class="hide modal-overlay">
        <div class="modal-box">
            <div id="modalIcon" class="modal-icon"></div>
            <h3 id="modalTitle" class="modal-title">Pemberitahuan</h3>
            <p id="modalMessage" class="modal-msg"></p>
            <div id="modalButtons"></div>
        </div>
    </div>

    <!-- ===== MODAL PASSWORD ADMIN ===== -->
    <div id="passwordModal" class="hide modal-overlay">
        <div class="modal-box">
            <div class="modal-icon icon-info">🔐</div>
            <h3 class="modal-title">Akses Admin</h3>
            <p class="modal-msg">Masukkan sandi administrator</p>
            <input type="password" id="passwordInput" placeholder="Sandi..." class="pw-input" onkeypress="if(event.key==='Enter') cekSandiAdmin()">
            <div class="modal-btn-row">
                <button onclick="tutupPasswordModal()" class="modal-btn-secondary">Batal</button>
                <button onclick="cekSandiAdmin()" class="modal-btn-primary" style="flex:2;">Masuk</button>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CARD ===== -->
    <div class="login-card" id="mainCard">

        <!-- LOGO -->
        <div class="logo-wrapper">
            <img src="https://www.image2url.com/r2/bucket3/images/1780805353152-300faec4-c45b-4179-9fb2-beaee1861149.png" alt="Logo SMKN 1 Banjarmasin">
        </div>

        <!-- JUDUL -->
        <h1 class="portal-title">Portal Ujian</h1>
        <p class="portal-subtitle">CBT SMKN 1 Banjarmasin</p>

        <!-- ===== STEP 1: INPUT NIS ===== -->
        <div id="nisCard">
            <label class="form-label">Nomor Induk Siswa (NIS)</label>
            <input
                type="text"
                id="nisInput"
                placeholder="Masukkan NIS Anda..."
                class="nis-input"
                onkeypress="if(event.key==='Enter') cekNIS()"
            >
            <button onclick="cekNIS()" id="btnCariSiswa" class="btn-cek">Cek Data Siswa</button>
        </div>

        <!-- ===== STEP 2: INFO SISWA ===== -->
        <div id="studentInfoCard" class="hide">
            <div class="success-badge">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                Data Anda Ditemukan
            </div>
            <div class="info-grid">
                <div class="full-col">
                    <div class="field-label">Nama Lengkap</div>
                    <div class="field-value" id="studentName">—</div>
                </div>
                <div>
                    <div class="field-label">NIS</div>
                    <div class="field-value" id="studentNis">—</div>
                </div>
                <div>
                    <div class="field-label">Kelas</div>
                    <div class="field-value" id="studentKelas">—</div>
                </div>
                <div class="full-col">
                    <div class="field-label">Jurusan</div>
                    <div class="field-value" id="studentJurusan">—</div>
                </div>
            </div>
            <div class="action-row">
                <button onclick="batalLogin()" class="btn-bukan">Bukan Saya</button>
                <button onclick="bukaRuangTunggu()" class="btn-lanjut">✓ Ya, Benar — Lanjut</button>
            </div>
        </div>

        <!-- ===== STEP 3: RUANG TUNGGU ===== -->
        <div id="scheduleCard" class="hide">
            <div class="section-heading">Ruang Tunggu Ujian</div>
            <p id="scheduleStatusText" class="status-text"></p>
            <div class="schedule-grid">
                <div class="full-col">
                    <div class="field-label">Mata Pelajaran</div>
                    <div class="field-value mapel-value" id="scheduleMapel">—</div>
                </div>
                <div>
                    <div class="field-label">Guru Pengajar</div>
                    <div class="field-value" id="scheduleGuru">—</div>
                </div>
                <div>
                    <div class="field-label">Tanggal</div>
                    <div class="field-value" id="scheduleTanggal">—</div>
                </div>
                <div class="full-col">
                    <div class="field-label">Waktu Ujian</div>
                    <div class="field-value" id="scheduleWaktu">—</div>
                </div>
            </div>
            <button onclick="masukKeUjian()" id="btnStartExam" class="btn-mulai" disabled>Memuat Waktu...</button>
            <button onclick="batalLogin()" class="btn-bukan" style="width: 100%; margin-top: 12px;">← Kembali ke Awal</button>
        </div>

        <!-- ===== STEP 4: SOAL UJIAN ===== -->
        <div id="examCard" class="hide">
            <div class="exam-header">
                <div style="text-align:left;">
                    <div class="exam-mapel" id="examMapelTitle">Mapel</div>
                    <span class="exam-siswa-badge" id="examStudentInfo">Nama - Kelas</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="nomor-soal-box" style="border-color: #fca5a5; background: #fef2f2;">
                        <div class="nomor-soal-label" style="color: #ef4444;">Sisa Waktu</div>
                        <div class="nomor-soal-num" id="timerDisplay" style="color: #dc2626; font-size: 1.4rem;">00:00</div>
                    </div>
                    <div class="nomor-soal-box">
                        <div class="nomor-soal-label">Soal</div>
                        <div class="nomor-soal-num" id="nomorSoalDisplay">1</div>
                    </div>
                    <button onclick="toggleNavigasi()" class="nomor-soal-box" style="cursor: pointer; background: #eff6ff; border-color: #bfdbfe; display: flex; align-items: center; justify-content: center; padding: 0 16px; transition: all 0.2s;">
                        <span style="font-size: 1.4rem; color: #2563eb;">☰</span>
                    </button>
                </div>
            </div>

            <p id="teksSoal" class="teks-soal"></p>
            <div id="opsiJawaban"></div>

            <div class="exam-footer">
                <button onclick="gantiSoal(-1)" class="btn-prev">← Sebelumnya</button>
                <button id="btnNextSelesai" onclick="gantiSoal(1)" class="btn-next">Selanjutnya →</button>
            </div>
            <div style="margin-top: 12px;">
                <button onclick="kembaliKePortal()" class="btn-bukan" style="width: 100%;">← Kembali ke Portal</button>
            </div>
        </div>

    </div>

    <!-- pintu rahasia (double-click logo) -->
    <div class="admin-link" id="adminTrigger" ondblclick="bukaPintuRahasia()">admin</div>

    <script>
        const sb = supabase.createClient(
            'https://lntfulglflqoatahvwjd.supabase.co',
            'sb_publishable_fCSKRizp5vzbFUxBsTcb5g_jSSSOO0h'
        );

        let dataSiswaAktif = null;
        let jadwalAktif    = null;
        let cheatCount     = 0;
        let soalList       = [];
        let jawabanSiswa   = [];
        let examTimerInterval = null;
        let sisaWaktuDetik = 0;

        /* ---- MODAL ---- */
        function showStudentModal(title, msg, type = 'info', isConfirm = false, onConfirm = null) {
            document.getElementById('modalTitle').innerHTML   = title;
            document.getElementById('modalMessage').innerHTML = msg;

            const icon = document.getElementById('modalIcon');
            const map  = { error: ['icon-error','✖'], success: ['icon-success','✔'], warning: ['icon-warning','⚠'], info: ['icon-info','ℹ'] };
            const [cls, sym] = map[type] || map.info;
            icon.className   = `modal-icon ${cls}`;
            icon.innerHTML   = sym;

            let btn = '';
            if (isConfirm) {
                btn = `<div class="modal-btn-row">
                    <button onclick="tutupModal()" class="modal-btn-secondary">Batal</button>
                    <button id="btnConfirmModal" class="modal-btn-primary" style="flex:2;">Ya, Yakin</button>
                </div>`;
            } else {
                btn = `<button onclick="tutupModal()" class="modal-btn-primary">Mengerti</button>`;
            }

            document.getElementById('modalButtons').innerHTML = btn;
            document.getElementById('studentModal').classList.remove('hide');

            if (isConfirm && onConfirm) {
                document.getElementById('btnConfirmModal').onclick = () => { tutupModal(); onConfirm(); };
            }
        }

        function tutupModal() {
            document.getElementById('studentModal').classList.add('hide');
        }

        /* ---- CEK NIS ---- */
        async function cekNIS() {
            const nis = document.getElementById('nisInput').value.trim();
            if (!nis) { showStudentModal("Peringatan", "Silakan masukkan NIS terlebih dahulu.", "warning"); return; }

            try {
                const { data, error } = await sb.from('siswa').select('*').eq('nis', nis).maybeSingle();
                if (error) { showStudentModal("❌ Kesalahan Database", error.message, "error"); return; }
                if (!data)  { showStudentModal("❌ Tidak Ditemukan", `NIS <strong>${nis}</strong> tidak terdaftar dalam sistem.`, "error"); return; }

                dataSiswaAktif = data;
                tampilkanInfoSiswa();
            } catch (err) {
                showStudentModal("❌ Kesalahan", err.message, "error");
            }
        }

        function tampilkanInfoSiswa() {
            document.getElementById('studentNis').textContent     = dataSiswaAktif.nis;
            document.getElementById('studentName').textContent    = dataSiswaAktif.nama     || 'Tidak terdaftar';
            document.getElementById('studentJurusan').textContent = dataSiswaAktif.jurusan  || 'Tidak terdaftar';
            document.getElementById('studentKelas').textContent   = `${dataSiswaAktif.tingkat||''} ${dataSiswaAktif.rombel||''}`.trim() || 'Tidak terdaftar';
            show('studentInfoCard'); hide('nisCard');
        }

        function batalLogin() {
            clearInterval(examTimerInterval);
            dataSiswaAktif = null;
            jadwalAktif = null;
            document.getElementById('nisInput').value = '';
            hide('studentInfoCard');
            hide('scheduleCard');
            hide('examCard');
            show('nisCard');
        }

        /* ---- RUANG TUNGGU ---- */
        async function bukaRuangTunggu() {
            try {
                const kelasValue = `${dataSiswaAktif.tingkat||''} ${dataSiswaAktif.rombel||''}`.trim();
                
                // Use local timezone for 'today' (YYYY-MM-DD)
                const d = new Date();
                const today = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');

                // Fetch schedules for today
                const { data, error } = await sb.from('jadwal_ujian').select('*')
                    .eq('tanggal', today);

                if (error) { showStudentModal("❌ Kesalahan", error.message, "error"); return; }
                
                // Filter manually to handle case insensitivity
                const jadwalCocok = (data || []).filter(j => {
                    const sJurusan = (dataSiswaAktif.jurusan || '').toLowerCase().trim();
                    const sKelas = kelasValue.toLowerCase();
                    
                    const jJurusan = (j.jurusan || []).map(x => String(x).toLowerCase().trim());
                    const jKelas = (j.kelas || []).map(x => String(x).toLowerCase().trim());
                    
                    return jJurusan.includes(sJurusan) && jKelas.includes(sKelas);
                });

                if (jadwalCocok.length === 0) {
                    showStudentModal("⏳ Jadwal Belum Ada", `Jadwal ujian untuk <strong>${kelasValue}</strong> belum dirilis oleh guru pada tanggal ini.`, "info");
                    batalLogin(); return;
                }

                jadwalAktif = jadwalCocok[0];
                tampilkanRuangTunggu();
            } catch (err) {
                showStudentModal("❌ Kesalahan", err.message, "error");
            }
        }

        function tampilkanRuangTunggu() {
            document.getElementById('scheduleMapel').textContent   = jadwalAktif.nama_mapel;
            document.getElementById('scheduleGuru').textContent    = jadwalAktif.nama_pengajar;
            document.getElementById('scheduleTanggal').textContent = new Date(jadwalAktif.tanggal).toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
            document.getElementById('scheduleWaktu').textContent   = `${jadwalAktif.jam_mulai} – ${jadwalAktif.jam_selesai}`;
            hide('studentInfoCard'); show('scheduleCard');
            cekWaktuUjian();
        }

        function cekWaktuUjian() {
            const now = new Date();
            const [jM, mM] = jadwalAktif.jam_mulai.split(':').map(Number);
            const [jS, mS] = jadwalAktif.jam_selesai.split(':').map(Number);
            const mulai   = new Date(jadwalAktif.tanggal); mulai.setHours(jM, mM, 0, 0);
            const selesai = new Date(jadwalAktif.tanggal); selesai.setHours(jS, mS, 59, 999);

            const btn    = document.getElementById('btnStartExam');
            const status = document.getElementById('scheduleStatusText');

            if (now < mulai) {
                const sisa  = Math.ceil((mulai - now) / 1000);
                const jam   = Math.floor(sisa / 3600);
                const menit = Math.floor((sisa % 3600) / 60);
                status.textContent   = `Ujian dimulai dalam ${jam}j ${menit}m`;
                btn.disabled         = true;
                btn.textContent      = 'Menunggu Waktu...';
                btn.style.cursor     = 'not-allowed';
                setTimeout(cekWaktuUjian, 30000);
            } else if (now > selesai) {
                status.textContent = 'Waktu ujian telah berakhir';
                btn.disabled       = true;
                btn.textContent    = 'Ujian Telah Selesai';
                btn.style.cursor   = 'not-allowed';
            } else {
                status.textContent = '✓ Siap untuk ujian';
                btn.disabled       = false;
                btn.textContent    = 'Mulai Ujian →';
                btn.style.cursor   = 'pointer';
            }
        }

        /* ---- UJIAN ---- */
        async function masukKeUjian() {
            try {
                const { data, error } = await sb.from('bank_soal').select('soal, durasi_menit')
                    .eq('id', jadwalAktif.bank_soal_id)
                    .maybeSingle();

                if (error) { showStudentModal("❌ Kesalahan", error.message, "error"); return; }
                if (!data || !data.soal || data.soal.length === 0) {
                    showStudentModal("⚠️ Soal Tidak Ada", "Soal belum diunggah oleh guru.", "warning"); return;
                }

                soalList = data.soal;
                
                // Shuffle soal (Fisher-Yates)
                for (let i = soalList.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [soalList[i], soalList[j]] = [soalList[j], soalList[i]];
                }
                
                jawabanSiswa = new Array(soalList.length).fill(null);
                
                // Mulai Timer
                const durasi = data.durasi_menit || 90;
                mulaiTimerUjian(durasi);
                
                hide('scheduleCard'); show('examCard');
                tampilkanSoal(0);
            } catch (err) {
                showStudentModal("❌ Kesalahan", err.message, "error");
            }
        }

        function mulaiTimerUjian(durasiMenit) {
            clearInterval(examTimerInterval);
            sisaWaktuDetik = durasiMenit * 60;
            updateTimerDisplay();

            examTimerInterval = setInterval(() => {
                sisaWaktuDetik--;
                if (sisaWaktuDetik <= 0) {
                    clearInterval(examTimerInterval);
                    sisaWaktuDetik = 0;
                    updateTimerDisplay();
                    selesaiUjian(true);
                } else {
                    updateTimerDisplay();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const jam = Math.floor(sisaWaktuDetik / 3600);
            const sisaMnt = sisaWaktuDetik % 3600;
            const mnt = Math.floor(sisaMnt / 60);
            const dtk = sisaMnt % 60;
            
            const fmt = (n) => n.toString().padStart(2, '0');
            const display = jam > 0 ? `${fmt(jam)}:${fmt(mnt)}:${fmt(dtk)}` : `${fmt(mnt)}:${fmt(dtk)}`;
            
            const timerEl = document.getElementById('timerDisplay');
            if (timerEl) timerEl.textContent = display;
        }

        function tampilkanSoal(index) {
            if (index < 0 || index >= soalList.length) return;
            const soal = soalList[index];

            document.getElementById('examMapelTitle').textContent = jadwalAktif.nama_mapel;
            document.getElementById('examStudentInfo').textContent = `${dataSiswaAktif.nama} — ${dataSiswaAktif.tingkat||''} ${dataSiswaAktif.rombel||''}`.trim();
            document.getElementById('nomorSoalDisplay').textContent = index + 1;
            document.getElementById('teksSoal').textContent = soal.text;

            const opsiEl = document.getElementById('opsiJawaban');
            opsiEl.innerHTML = '';

            const hurufOptions = ['a','b','c','d','e'];
            if (soal.opsi && Array.isArray(soal.opsi)) {
                soal.opsi.forEach((label, idx) => {
                    if (!label) return;
                    const o = hurufOptions[idx];

                    const div = document.createElement('div');
                    div.className = 'opsi-item' + (jawabanSiswa[index] === o ? ' selected' : '');

                    const huruf = document.createElement('span');
                    huruf.className = 'opsi-huruf';
                    huruf.textContent = o.toUpperCase();

                    const teks = document.createElement('span');
                    teks.textContent = label;

                    div.appendChild(huruf);
                    div.appendChild(teks);
                    div.onclick = () => pilihJawaban(index, o, div);
                    opsiEl.appendChild(div);
                });
            }

            document.getElementById('btnNextSelesai').textContent =
                index === soalList.length - 1 ? 'Selesai ✓' : 'Selanjutnya →';
                
            renderNavigasiSoal(index);
        }

        function renderNavigasiSoal(currentIndex) {
            const grid = document.getElementById('navigasiSoalGrid');
            grid.innerHTML = '';
            for (let i = 0; i < soalList.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-nav-soal';
                if (jawabanSiswa[i] !== null) btn.classList.add('answered');
                if (i === currentIndex) btn.classList.add('active');
                
                btn.textContent = i + 1;
                btn.onclick = () => {
                    tampilkanSoal(i);
                    if (window.innerWidth <= 600) toggleNavigasi();
                };
                grid.appendChild(btn);
            }
        }

        function toggleNavigasi() {
            document.getElementById('navigasiWrapper').classList.toggle('open');
            document.getElementById('navigasiOverlay').classList.toggle('open');
        }

        function pilihJawaban(index, jawaban, el) {
            jawabanSiswa[index] = jawaban;
            document.querySelectorAll('#opsiJawaban .opsi-item').forEach(d => d.classList.remove('selected'));
            el.classList.add('selected');
            renderNavigasiSoal(index);
        }

        function gantiSoal(arah) {
            const cur  = parseInt(document.getElementById('nomorSoalDisplay').textContent) - 1;
            const next = cur + arah;
            if (next < 0 || next >= soalList.length) { if (arah > 0) selesaiUjian(); return; }
            tampilkanSoal(next);
        }

        function kembaliKePortal() {
            showStudentModal(
                "Kembali ke Portal?", 
                "Apakah Anda yakin ingin keluar dari halaman soal? Jawaban Anda akan di-reset karena Anda keluar sepenuhnya dari sesi ujian.", 
                "warning", 
                true, 
                () => {
                    batalLogin();
                }
            );
        }

        async function selesaiUjian(isAutoSubmit = false) {
            try {
                clearInterval(examTimerInterval);
                const benar = jawabanSiswa.filter((j, i) => j && j.toLowerCase() === soalList[i].jawaban.toLowerCase()).length;
                const total_soal = soalList.length;
                const skor = Math.round((benar / total_soal) * 100);

                const payload = {
                    jadwal_id: jadwalAktif.id,
                    bank_soal_id: jadwalAktif.bank_soal_id,
                    nis: dataSiswaAktif.nis,
                    siswa_nama: dataSiswaAktif.nama,
                    jurusan: dataSiswaAktif.jurusan,
                    tingkat: dataSiswaAktif.tingkat,
                    rombel: dataSiswaAktif.rombel,
                    jawaban: jawabanSiswa,
                    skor: skor,
                    total_soal: total_soal,
                    is_selesai: true,
                    waktu_submit: new Date().toISOString()
                };

                const { data: existing } = await sb.from('hasil_ujian').select('id')
                    .eq('jadwal_id', jadwalAktif.id).eq('nis', dataSiswaAktif.nis).maybeSingle();

                if (existing) {
                    await sb.from('hasil_ujian').update(payload).eq('id', existing.id);
                } else {
                    await sb.from('hasil_ujian').insert([payload]);
                }

                const title = isAutoSubmit ? "⏰ Waktu Habis" : "🎉 Berhasil Disimpan";
                const msg = isAutoSubmit 
                    ? `Waktu ujian telah habis dan jawaban Anda disubmit otomatis.<br><br>Jawaban benar: <strong>${benar}</strong> dari <strong>${total_soal}</strong>`
                    : `Jawaban benar: <strong>${benar}</strong> dari <strong>${total_soal}</strong>`;
                const type = isAutoSubmit ? "warning" : "success";

                showStudentModal(title, msg, type);
                document.getElementById('modalButtons').innerHTML =
                    `<button onclick="window.location.reload()" class="modal-btn-success-full">Tutup Ujian</button>`;
            } catch (err) {
                showStudentModal("❌ Kesalahan", err.message || 'Gagal menyimpan hasil ujian.', "error");
            }
        }

        /* ---- ADMIN ---- */
        function bukaPintuRahasia() {
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordModal').classList.remove('hide');
            setTimeout(() => document.getElementById('passwordInput').focus(), 100);
        }

        function tutupPasswordModal() {
            document.getElementById('passwordModal').classList.add('hide');
            document.getElementById('passwordInput').value = '';
        }

        function cekSandiAdmin() {
            const sandi = document.getElementById('passwordInput').value;
            if (!sandi) { showStudentModal("Peringatan", "Masukkan sandi terlebih dahulu.", "info"); return; }
            if (sandi === "admin123") {
                tutupPasswordModal();
                showStudentModal("✓ Akses Diterima", "Mengarahkan ke panel admin...", "success");
                setTimeout(() => {
                    const url = window.location.hostname.includes('localhost') ? '/admin.html' : '/admin';
                    window.location.href = url;
                }, 600);
            } else {
                document.getElementById('passwordInput').value = '';
                showStudentModal("❌ Akses Ditolak", "Sandi yang Anda masukkan salah.", "error");
            }
        }

        /* ---- HELPERS ---- */
        function show(id) { document.getElementById(id).classList.remove('hide'); }
        function hide(id) { document.getElementById(id).classList.add('hide'); }

        /* ---- ANTI CHEAT ---- */
        document.addEventListener("visibilitychange", () => {
            if (document.hidden && jadwalAktif && !document.getElementById('examCard').classList.contains('hide')) {
                cheatCount++;
                showStudentModal("⚠️ Peringatan Pelanggaran", "Anda terdeteksi membuka tab lain atau keluar dari layar ujian. Harap fokus pada ujian Anda!", "error");
            }
        });

        /* ---- DOUBLE-CLICK LOGO = ADMIN ---- */
        document.querySelector('.logo-wrapper').addEventListener('dblclick', bukaPintuRahasia);
    </script>
</body>
</html>
